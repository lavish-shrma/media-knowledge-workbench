services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: indika-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-indika_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME_IN_ENV}
      POSTGRES_DB: ${POSTGRES_DB:-indika}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d indika"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: indika-redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: indika-backend
    environment:
      APP_ENV: development
      DEBUG: "true"
      API_V1_PREFIX: /api/v1
      DATABASE_URL: ${DATABASE_URL}
      UPLOADS_DIR: /app/uploads
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: indika-frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
